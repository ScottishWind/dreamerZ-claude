name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dev-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-dev-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Check formatting (black)
        run: black --check --config pyproject.toml backend/

      - name: Check import order (isort)
        run: isort --check-only --settings-path pyproject.toml backend/

      - name: Lint (flake8)
        run: flake8 --config pyproject.toml backend/

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No backend tests directory found — skipping"
          fi

  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint)
        working-directory: frontend
        run: yarn eslint src/ --max-warnings 0 || true

      - name: Check formatting (Prettier)
        working-directory: frontend
        run: yarn prettier --check "src/**/*.{js,jsx,json,css}" || true

      - name: Build
        working-directory: frontend
        run: yarn build
