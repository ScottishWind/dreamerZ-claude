name: Render Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  render-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_BACKEND_SERVICE_ID != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy backend to Render
        uses: renderapp/render-deploy-action@v3
        with:
          api_key: ${{ secrets.RENDER_API_KEY }}
          service_id: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          wait_for_deployment: true

  render-frontend:
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest
    needs: render-backend
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_FRONTEND_SERVICE_ID != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy frontend to Render
        uses: renderapp/render-deploy-action@v3
        with:
          api_key: ${{ secrets.RENDER_API_KEY }}
          service_id: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
          wait_for_deployment: true
